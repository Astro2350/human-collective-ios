name: HumanCollective
options:
  bundleIdPrefix: com.sam
  createIntermediateGroups: true
  xcodeVersion: "26.6"
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "5"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
schemes:
  HumanCollective:
    build:
      targets:
        HumanCollective: all
        HumanCollectiveTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: HumanCollectiveTests
    archive:
      config: Release
targets:
  HumanCollective:
    type: application
    platform: iOS
    sources:
      - path: HumanCollective
        excludes:
          - Config
          - Resources
      - path: HumanCollective/Resources
        buildPhase: resources
        excludes:
          - Info.plist
      - path: Shared
    configFiles:
      Debug: HumanCollective/Config/Debug.xcconfig
      Release: HumanCollective/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.HumanCollective
        PRODUCT_NAME: Human Collective
        INFOPLIST_FILE: HumanCollective/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: HumanCollectiveWidget
        embed: true
  HumanCollectiveWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HumanCollectiveWidget
      - path: Shared
    configFiles:
      Debug: HumanCollective/Config/Debug.xcconfig
      Release: HumanCollective/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.HumanCollective.Widget
        PRODUCT_NAME: Human Collective Widgets
        INFOPLIST_FILE: HumanCollectiveWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
  HumanCollectiveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HumanCollectiveTests
    dependencies:
      - target: HumanCollective
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.HumanCollective.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Human Collective.app/Human Collective"
        BUNDLE_LOADER: "$(TEST_HOST)"

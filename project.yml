name: HumanCulture
options:
  bundleIdPrefix: com.sam
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  HumanCulture:
    type: application
    platform: iOS
    sources:
      - path: HumanCulture
        excludes:
          - Config
          - Resources
    resources:
      - path: HumanCulture/Resources
    configFiles:
      Debug: HumanCulture/Config/Debug.xcconfig
      Release: HumanCulture/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.HumanCulture
        PRODUCT_NAME: Human Culture
        INFOPLIST_FILE: HumanCulture/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO


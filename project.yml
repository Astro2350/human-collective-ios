name: HumanCollective
options:
  bundleIdPrefix: com.sam
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  HumanCollective:
    type: application
    platform: iOS
    sources:
      - path: HumanCollective
        excludes:
          - Config
          - Resources
    resources:
      - path: HumanCollective/Resources
    configFiles:
      Debug: HumanCollective/Config/Debug.xcconfig
      Release: HumanCollective/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.HumanCollective
        PRODUCT_NAME: Human Collective
        INFOPLIST_FILE: HumanCollective/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
